version: '3.9'

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-buildconstruct}
      POSTGRES_USER:     ${POSTGRES_USER:-bcuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bcpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bcuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bc_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (NestJS) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bc_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:          production
      DATABASE_URL:      postgres://${POSTGRES_USER:-bcuser}:${POSTGRES_PASSWORD:-bcpass}@postgres:5432/${POSTGRES_DB:-buildconstruct}
      REDIS_URL:         redis://redis:6379
      JWT_SECRET:        ${JWT_SECRET:-changeme_in_production}
      JWT_EXPIRES_IN:    ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-7}
      PORT:              3000
    ports:
      - "3000:3000"

  # ── Frontend (React + nginx) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bc_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
